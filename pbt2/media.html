<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
</head>

<body>

    <h1>Giới thiệu sản phẩm</h1>

    <!-- ẢNH SẢN PHẨM -->
    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="https://www.apple.com/v/iphone-17-pro/c/images/overview/welcome/hero__bdntboqignj6_xlarge.jpg"
             alt="Ảnh sản phẩm 1"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 1 - Thiết kế hiện đại</figcaption>
    </figure>

    <figure>
        <img src="https://www.apple.com/newsroom/images/2025/09/apple-unveils-iphone-17-pro-and-iphone-17-pro-max/article/Apple-iPhone-17-Pro-cosmic-orange-250909_inline.jpg.large_2x.jpg"
             alt="Ảnh sản phẩm 2"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 2 - Chất lượng cao</figcaption>
    </figure>

    <figure>
        <img src="https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/iphone-17-pro-finish-select-202509-6-3inch-silver?wid=1200&hei=630&fmt=jpeg&qlt=95&.v=1757697202653"
             alt="Ảnh sản phẩm 3"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Sản phẩm 3 - Nhiều màu sắc</figcaption>
    </figure>

    <!-- VIDEO YOUTUBE -->
    <h2>Video giới thiệu (YouTube)</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/kTKRLi-9hXU?si=mREJu_fB16x0TFVL"
        title="Video giới thiệu sản phẩm"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <!-- VIDEO LOCAL -->
    <h2>Video sản phẩm</h2>

    <video controls poster="https://via.placeholder.com/400" style="max-width:100%;">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt của bạn không hỗ trợ video.
    </video>

    <!-- AUDIO -->
    <h2>Nhạc nền</h2>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Trình duyệt của bạn không hỗ trợ audio.
    </audio>
oce
    <!-- SVG -->
    <h2>Logo (SVG)</h2>

    <svg width="100" height="100">
        <circle cx="50" cy="50" r="40" fill="green" />
        <text x="50" y="55" text-anchor="middle" fill="white" font-size="14">
            Linn
        </text>
    </svg>

</body>
</html>
